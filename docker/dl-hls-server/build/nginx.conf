worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    error_log /dev/stderr info;
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';

    access_log /dev/stderr main;

    server {
        listen 80;

        # 1. Handle standard HLS chunks (.m4s, .mp4) and images (.jpg)
        location / {
            root /hls;

            # fMP4 CORS setup
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, HEAD, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, Range, Accept, Accept-Encoding, Referer, Cache-Control' always;
            add_header 'Access-Control-Expose-Headers' 'Server, range, Content-Length, Content-Range' always;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, HEAD, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'Origin, Range, Accept, Accept-Encoding, Referer, Cache-Control';
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain charset=UTF-8';
                add_header 'Content-Length' 0;
                return 204;
            }

            types {
                application/vnd.apple.mpegurl m3u8;
                video/iso.segment m4s;
                video/mp4 mp4;
                image/jpeg jpg;
            }
        }

        # 2. Specific block just for playlists (.m3u8)
        location ~* \.m3u8$ {
            root /hls;

            # Anti-caching for the M3U8 playlists
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;

            # MUST RE-DECLARE CORS HERE because we are in a new block
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, HEAD, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, Range, Accept, Accept-Encoding, Referer, Cache-Control' always;
            add_header 'Access-Control-Expose-Headers' 'Server, range, Content-Length, Content-Range' always;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, HEAD, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'Origin, Range, Accept, Accept-Encoding, Referer, Cache-Control';
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain charset=UTF-8';
                add_header 'Content-Length' 0;
                return 204;
            }

            default_type application/vnd.apple.mpegurl;
        }
    }
}
